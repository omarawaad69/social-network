<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تشخيص ماي سمسم</title>
  <style>
    body { background: #0b0b1a; color: #fff; font-family: sans-serif; padding: 20px; }
    .card { background: rgba(255,255,255,0.08); padding: 20px; border-radius: 16px; margin: 20px 0; }
    pre { background: #1a1a2e; padding: 15px; border-radius: 8px; overflow-x: auto; white-space: pre-wrap; }
    .success { color: #6bff90; }
    .error { color: #ff6b6b; }
    button { background: #e94560; color: #fff; border: none; padding: 10px 20px; border-radius: 30px; font-weight: bold; cursor: pointer; margin: 5px; }
  </style>
</head>
<body>
  <h1>🐿️ تشخيص ماي سمسم</h1>
  <div class="card">
    <p>حالة التوكن: <span id="tokenStatus">يتم الفحص...</span></p>
    <p>رابط الخادم: <strong id="apiBase"></strong></p>
  </div>

  <button onclick="testMe()">1️⃣ اختبار /api/me</button>
  <button onclick="testPostText()">2️⃣ اختبار نشر نصي</button>
  <button onclick="testPostImage()">3️⃣ اختبار نشر صورة وهمية</button>

  <div class="card">
    <h3>نتيجة الاختبار:</h3>
    <pre id="output">اضغط على أي زر لبدء الاختبار...</pre>
  </div>

  <script>
    const API_BASE = 'https://social-api.omarawaad69.workers.dev'; // ⚠️ استبدل XXXXX
    document.getElementById('apiBase').innerText = API_BASE;

    function getToken() { return localStorage.getItem('token'); }
    function showTokenStatus() {
      const t = getToken();
      document.getElementById('tokenStatus').innerHTML = t ? '<span class="success">✅ موجود</span>' : '<span class="error">❌ غير موجود (سجل الدخول أولاً)</span>';
    }
    showTokenStatus();

    function setOutput(text) {
      document.getElementById('output').innerText = text;
    }

    async function testMe() {
      setOutput('جارٍ اختبار /api/me...');
      const token = getToken();
      if (!token) return setOutput('❌ لا يوجد توكن. سجل الدخول أولاً من الموقع الرئيسي.');
      try {
        const res = await fetch(API_BASE + '/api/me', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        setOutput('حالة الطلب: ' + res.status + '\nالرد:\n' + JSON.stringify(data, null, 2));
        if (!res.ok) setOutput('❌ فشل. تأكد من التوكن وصحة الرابط.');
      } catch (e) {
        setOutput('❌ خطأ في الاتصال: ' + e.message + '\nتأكد من رابط الـ Worker ومن أنه يعمل.');
      }
    }

    async function testPostText() {
      setOutput('جارٍ اختبار نشر منشور نصي...');
      const token = getToken();
      if (!token) return setOutput('❌ لا يوجد توكن.');
      try {
        const res = await fetch(API_BASE + '/api/posts', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify({ content: 'اختبار نصي من صفحة التشخيص' })
        });
        const data = await res.json();
        setOutput('حالة الطلب: ' + res.status + '\nالرد:\n' + JSON.stringify(data, null, 2));
        if (data.id) setOutput('✅ تم نشر المنشور النصي بنجاح.\n' + JSON.stringify(data, null, 2));
      } catch (e) {
        setOutput('❌ خطأ في الاتصال: ' + e.message);
      }
    }

    async function testPostImage() {
      setOutput('جارٍ اختبار نشر صورة وهمية...');
      const token = getToken();
      if (!token) return setOutput('❌ لا يوجد توكن.');
      // إنشاء ملف وهمي بصيغة PNG
      const fakeImage = new Blob(['fake image content'], { type: 'image/png' });
      const formData = new FormData();
      formData.append('content', 'اختبار صورة وهمية');
      formData.append('image', fakeImage, 'test.png');

      try {
        const res = await fetch(API_BASE + '/api/posts', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + token
            // لا نضع Content-Type
          },
          body: formData
        });
        const data = await res.json();
        setOutput('حالة الطلب: ' + res.status + '\nالرد:\n' + JSON.stringify(data, null, 2));
        if (data.id) setOutput('✅ تم نشر الصورة الوهمية بنجاح.\n' + JSON.stringify(data, null, 2));
        else if (res.status === 500) setOutput('❌ خطأ في الخادم (500). تفقد سجلات الـ Worker أو تحقق من ربط R2 باسم BUCKET.');
      } catch (e) {
        setOutput('❌ فشل الاتصال: ' + e.message + '\nتحقق من رابط الـ Worker وسياسة CORS.');
      }
    }
  </script>
</body>
</html>
