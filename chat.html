<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <title>ماي سمسم - محادثة</title>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <a href="chats.html">⬅ رجوع</a>
      <span id="chatTitle" style="font-weight:700;">محادثة</span>
      <button class="mode-toggle" onclick="toggleMode()" title="تغيير الوضع">🌓</button>
    </div>
    <div id="messages" style="min-height:60vh; padding:10px 0;"></div>
    <div style="display:flex; gap:8px; margin-top:10px; align-items:center;">
      <button class="btn btn-small" id="recordBtn" onclick="toggleRecording()">🎤</button>
      <input id="msgInput" placeholder="اكتب رسالة..." style="flex:1;">
      <button class="btn btn-small" onclick="sendMsg()">إرسال</button>
    </div>
    <div id="recordingStatus" style="display:none; color:red; text-align:center; margin-top:4px;">جاري التسجيل...</div>
  </div>
  <script src="js/api.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const otherId = params.get('user') || params.get('id');
    if (!otherId) location.href = 'chats.html';
    if (!getToken()) location.href = 'login.html';

    let chatId = null;
    let myId = null;
    let isRecording = false;
    let mediaStream = null;
    let audioContext = null;
    let scriptProcessor = null;
    let audioChunks = [];

    function toggleMode() {
      document.body.classList.toggle('light-mode');
      localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
    }

    async function init() {
      if (localStorage.getItem('theme') === 'light') {
        document.body.classList.add('light-mode');
      }
      const me = await apiGet('/api/me');
      myId = me.id;
      const other = await apiGet('/api/user/' + otherId);
      document.getElementById('chatTitle').innerText = '@' + other.username;

      const chatRes = await apiPost('/api/chats', { otherUserId: otherId });
      chatId = chatRes.chatId;
      await apiPost(`/api/chats/${chatId}/read`, {});
      loadMessages();
      setInterval(loadMessages, 3000);
    }

    async function loadMessages() {
      if (!chatId) return;
      const msgs = await apiGet(`/api/chats/${chatId}/messages`);
      const div = document.getElementById('messages');
      div.innerHTML = msgs.map(m => {
        if (m.audio_url) {
          return `
            <div class="chat-bubble ${m.sender_id === myId ? 'chat-sent' : 'chat-received'}">
              <div class="audio-message">
                <audio controls src="${m.audio_url}"></audio>
              </div>
              <div class="chat-time">${new Date(m.created_at).toLocaleTimeString('ar-EG')}</div>
            </div>
          `;
        }
        return `
          <div class="chat-bubble ${m.sender_id === myId ? 'chat-sent' : 'chat-received'}">
            <div>${m.text}</div>
            <div class="chat-time">${new Date(m.created_at).toLocaleTimeString('ar-EG')}</div>
          </div>
        `;
      }).join('');
      div.scrollTop = div.scrollHeight;
    }

    async function sendMsg() {
      const input = document.getElementById('msgInput');
      const text = input.value.trim();
      if (!text) return;
      await apiPost(`/api/chats/${chatId}/messages`, { text });
      input.value = '';
      loadMessages();
    }

    async function toggleRecording() {
      if (isRecording) {
        stopRecording();
      } else {
        await startRecording();
      }
    }

    async function startRecording() {
      const statusDiv = document.getElementById('recordingStatus');
      const btn = document.getElementById('recordBtn');
      
      try {
        // طلب الميكروفون
        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        
        // استخدام AudioContext لمعالجة الصوت
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioContext.createMediaStreamSource(mediaStream);
        
        // ScriptProcessor لجمع البيانات الخام
        scriptProcessor = audioContext.createScriptProcessor(4096, 1, 1);
        audioChunks = [];

        scriptProcessor.onaudioprocess = function(e) {
          if (isRecording) {
            const inputData = e.inputBuffer.getChannelData(0);
            audioChunks.push(new Float32Array(inputData));
          }
        };

        source.connect(scriptProcessor);
        scriptProcessor.connect(audioContext.destination);
        
        isRecording = true;
        statusDiv.style.display = 'block';
        btn.innerText = '⏹️';
        btn.style.background = '#c0392b';
        
      } catch(e) {
        console.error('Mic error:', e);
        alert('لا يمكن الوصول للميكروفون: ' + (e.message || 'خطأ غير معروف'));
      }
    }

    async function stopRecording() {
      if (!isRecording) return;
      
      isRecording = false;
      const statusDiv = document.getElementById('recordingStatus');
      const btn = document.getElementById('recordBtn');
      
      try {
        // إيقاف المعالج
        if (scriptProcessor) {
          scriptProcessor.disconnect();
          scriptProcessor = null;
        }
        if (audioContext) {
          audioContext.close();
          audioContext = null;
        }
        if (mediaStream) {
          mediaStream.getTracks().forEach(track => track.stop());
          mediaStream = null;
        }

        // تحويل البيانات إلى WAV
        if (audioChunks.length > 0) {
          const wavBlob = encodeWAV(audioChunks, 44100);
          const fd = new FormData();
          fd.append('audio', wavBlob, 'voice.wav');
          fd.append('text', '');
          await apiPostFormData(`/api/chats/${chatId}/messages`, fd);
          loadMessages();
        }
      } catch(e) {
        console.error('Stop error:', e);
        alert('فشل إرسال التسجيل');
      } finally {
        statusDiv.style.display = 'none';
        btn.innerText = '🎤';
        btn.style.background = '';
        audioChunks = [];
      }
    }

    // دالة تحويل Float32Array إلى WAV Blob
    function encodeWAV(samples, sampleRate) {
      const bufferLength = samples.reduce((sum, arr) => sum + arr.length, 0);
      const buffer = new ArrayBuffer(44 + bufferLength * 2);
      const view = new DataView(buffer);
      
      // كتابة ترويسة WAV
      function writeString(view, offset, string) {
        for (let i = 0; i < string.length; i++) {
          view.setUint8(offset + i, string.charCodeAt(i));
        }
      }
      
      writeString(view, 0, 'RIFF');
      view.setUint32(4, 36 + bufferLength * 2, true);
      writeString(view, 8, 'WAVE');
      writeString(view, 12, 'fmt ');
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true); // PCM
      view.setUint16(22, 1, true); // Mono
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, sampleRate * 2, true);
      view.setUint16(32, 2, true);
      view.setUint16(34, 16, true);
      writeString(view, 36, 'data');
      view.setUint32(40, bufferLength * 2, true);
      
      // كتابة البيانات
      let offset = 44;
      for (const chunk of samples) {
        for (let i = 0; i < chunk.length; i++) {
          const s = Math.max(-1, Math.min(1, chunk[i]));
          view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
          offset += 2;
        }
      }
      
      return new Blob([buffer], { type: 'audio/wav' });
    }

    init();
  </script>
</body>
</html>
