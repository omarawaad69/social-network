<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <title>ماي سمسم - محادثة</title>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <a href="chats.html">⬅ رجوع</a>
      <span id="chatTitle" style="font-weight:700;">محادثة</span>
      <button class="mode-toggle" onclick="toggleMode()" title="تغيير الوضع">🌓</button>
    </div>
    <div id="messages" style="min-height:60vh; padding:10px 0;"></div>
    <div style="display:flex; gap:8px; margin-top:10px; align-items:center;">
      <button class="btn btn-small" id="recordBtn" onclick="toggleRecording()">🎤</button>
      <input id="msgInput" placeholder="اكتب رسالة..." style="flex:1;">
      <button class="btn btn-small" onclick="sendMsg()">إرسال</button>
    </div>
    <div id="recordingStatus" style="display:none; color:red; text-align:center; margin-top:4px;">جاري التسجيل...</div>
  </div>
  <script src="js/api.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const otherId = params.get('user') || params.get('id');
    if (!otherId) location.href = 'chats.html';
    if (!getToken()) location.href = 'login.html';

    let chatId = null;
    let myId = null;
    let mediaRecorder = null;
    let audioChunks = [];
    let isRecording = false;

    function toggleMode() {
      document.body.classList.toggle('light-mode');
      localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
    }

    async function init() {
      if (localStorage.getItem('theme') === 'light') {
        document.body.classList.add('light-mode');
      }
      const me = await apiGet('/api/me');
      myId = me.id;
      const other = await apiGet('/api/user/' + otherId);
      document.getElementById('chatTitle').innerText = '@' + other.username;

      const chatRes = await apiPost('/api/chats', { otherUserId: otherId });
      chatId = chatRes.chatId;
      await apiPost(`/api/chats/${chatId}/read`, {});
      loadMessages();
      setInterval(loadMessages, 3000);
    }

    async function loadMessages() {
      if (!chatId) return;
      const msgs = await apiGet(`/api/chats/${chatId}/messages`);
      const div = document.getElementById('messages');
      div.innerHTML = msgs.map(m => {
        if (m.audio_url) {
          return `
            <div class="chat-bubble ${m.sender_id === myId ? 'chat-sent' : 'chat-received'}">
              <div class="audio-message">
                <audio controls src="${m.audio_url}"></audio>
              </div>
              <div class="chat-time">${new Date(m.created_at).toLocaleTimeString('ar-EG')}</div>
            </div>
          `;
        }
        return `
          <div class="chat-bubble ${m.sender_id === myId ? 'chat-sent' : 'chat-received'}">
            <div>${m.text}</div>
            <div class="chat-time">${new Date(m.created_at).toLocaleTimeString('ar-EG')}</div>
          </div>
        `;
      }).join('');
      div.scrollTop = div.scrollHeight;
    }

    async function sendMsg() {
      const input = document.getElementById('msgInput');
      const text = input.value.trim();
      if (!text) return;
      await apiPost(`/api/chats/${chatId}/messages`, { text });
      input.value = '';
      loadMessages();
    }

    async function toggleRecording() {
      if (isRecording) {
        stopRecording();
      } else {
        await startRecording();
      }
    }

    async function startRecording() {
      const statusDiv = document.getElementById('recordingStatus');
      const btn = document.getElementById('recordBtn');
      
      try {
        // طلب الصلاحية صراحة
        const stream = await navigator.mediaDevices.getUserMedia({ 
          audio: {
            echoCancellation: true,
            noiseSuppression: true,
            sampleRate: 44100
          } 
        });
        
        // استخدام صيغة متوافقة مع WebView
        const mimeType = 'audio/mp4';
        
        mediaRecorder = new MediaRecorder(stream, { mimeType });
        audioChunks = [];

        mediaRecorder.ondataavailable = e => {
          if (e.data.size > 0) audioChunks.push(e.data);
        };

        mediaRecorder.onstop = async () => {
          const audioBlob = new Blob(audioChunks, { type: 'audio/mp4' });
          const fd = new FormData();
          fd.append('audio', audioBlob, 'voice.m4a');
          fd.append('text', '');
          try {
            await apiPostFormData(`/api/chats/${chatId}/messages`, fd);
            loadMessages();
          } catch(e) {
            alert('فشل إرسال التسجيل');
          }
          statusDiv.style.display = 'none';
          btn.innerText = '🎤';
          btn.style.background = '';
          stream.getTracks().forEach(track => track.stop());
        };

        mediaRecorder.onerror = (e) => {
          console.error('Recorder error:', e);
          alert('خطأ في التسجيل');
          statusDiv.style.display = 'none';
          btn.innerText = '🎤';
          btn.style.background = '';
          stream.getTracks().forEach(track => track.stop());
        };

        mediaRecorder.start();
        isRecording = true;
        statusDiv.style.display = 'block';
        btn.innerText = '⏹️';
        btn.style.background = '#c0392b';
        
      } catch(e) {
        console.error('Mic error:', e);
        if (e.name === 'NotAllowedError' || e.name === 'PermissionDeniedError') {
          alert('يرجى السماح للميكروفون.\nاذهب إلى: إعدادات الهاتف > التطبيقات > متصفحك > الصلاحيات > ميكروفون > سماح.');
        } else if (e.name === 'NotFoundError') {
          alert('لم يتم العثور على ميكروفون.');
        } else {
          alert('خطأ في الميكروفون: ' + (e.message || 'تأكد من صلاحية التطبيق'));
        }
      }
    }

    function stopRecording() {
      if (mediaRecorder && isRecording) {
        mediaRecorder.stop();
        isRecording = false;
      }
    }

    init();
  </script>
</body>
</html>
