<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <title>ماي سمسم - الرئيسية</title>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="logo-area">
        <!-- إذا وفرت صورة الشعار، أضف <img src="logo.png" class="logo-img" alt="شعار"> -->
        <span class="app-name-ar">ماي سمسم</span>
        <span class="app-name-en">MY SIMSIM</span>
      </div>
      <nav>
        <a href="index.html" class="active">الرئيسية</a>
        <a href="search.html">بحث</a>
        <a href="profile.html">ملفي</a>
        <a href="#" id="adminLink" style="display:none;">⚙️</a>
        <a href="#" onclick="logout()">خروج</a>
      </nav>
    </div>

    <div class="card">
      <textarea id="postContent" placeholder="ما الذي يدور في ذهنك؟" rows="2"></textarea>
      <div class="upload-btn-wrapper">
        <div class="upload-icon">📷 إضافة صورة</div>
        <input type="file" id="postImage" accept="image/*" onchange="previewImage()">
      </div>
      <img id="imagePreview" class="image-preview" />
      <button class="btn" id="publishBtn" onclick="createPost()">نشر</button>
    </div>
    <div id="feed"></div>
  </div>

  <script src="js/api.js"></script>
  <script>
    if (!getToken()) location.href = 'login.html';
    document.getElementById('publishBtn').setAttribute('data-text', 'نشر');

    // دالة معاينة الصورة
    function previewImage() {
      const file = document.getElementById('postImage').files[0];
      const preview = document.getElementById('imagePreview');
      if (file) {
        preview.src = URL.createObjectURL(file);
        preview.style.display = 'block';
      } else {
        preview.style.display = 'none';
      }
    }

    // تحميل المنشورات مع التفاعلات
    async function loadFeed() {
      const feed = document.getElementById('feed');
      feed.innerHTML = '<div style="text-align:center;"><span class="spinner"></span></div>';
      try {
        const posts = await apiGet('/api/posts');
        if (!posts.length) {
          feed.innerHTML = '<p style="color:#aaa; text-align:center;">لا توجد منشورات. تابع أصدقاء!</p>';
          return;
        }
        feed.innerHTML = posts.map(p => {
          const likedClass = p.liked_by_me ? 'liked' : '';
          return `
            <div class="card post">
              <div class="post-header">
                <div class="post-avatar">${p.username.charAt(0).toUpperCase()}</div>
                <span class="post-username">@${p.username}</span>
              </div>
              <div class="post-content">${p.content || ''}</div>
              ${p.image_url ? `<img src="${p.image_url}" class="post-image">` : ''}
              <div class="post-actions">
                <button class="${likedClass}" onclick="likePost('${p.id}', this)">
                  ${p.liked_by_me ? '❤️' : '🤍'} <span>${p.likes_count || 0}</span>
                </button>
                <button onclick="toggleComments('${p.id}')">💬 <span>${p.comments_count || 0}</span></button>
              </div>
              <div id="comments-${p.id}" class="comment-section" style="display:none;"></div>
            </div>
          `;
        }).join('');
      } catch (e) {
        feed.innerHTML = '<p style="color:red;">فشل تحميل المنشورات</p>';
      }
    }

    async function createPost() {
      const content = document.getElementById('postContent').value.trim();
      const imageFile = document.getElementById('postImage').files[0];
      if (!content && !imageFile) return alert('أضف نصاً أو صورة');
      const btn = document.getElementById('publishBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';
      try {
        let result;
        if (imageFile) {
          const fd = new FormData();
          fd.append('content', content);
          fd.append('image', imageFile);
          result = await apiPostFormData('/api/posts', fd);
        } else {
          result = await apiPost('/api/posts', { content });
        }
        if (result.id) {
          document.getElementById('postContent').value = '';
          document.getElementById('postImage').value = '';
          document.getElementById('imagePreview').style.display = 'none';
          loadFeed();
        } else {
          alert('فشل النشر: ' + (result.error || 'خطأ غير معروف'));
        }
      } catch (e) {
        alert('تعذر الاتصال بالخادم');
      } finally {
        btn.disabled = false;
        btn.innerHTML = btn.getAttribute('data-text');
      }
    }

    async function likePost(postId, btn) {
      const res = await apiPost('/api/like', { postId });
      if (res.liked !== undefined) {
        loadFeed(); // إعادة تحميل لتحديث العداد
      }
    }

    // التعليقات (نفس السابق مع تحسين الشكل)
    async function toggleComments(postId) { ... }
    async function addComment(postId) { ... }

    // أيقونة الأدمن
    (async function checkAdmin() {
      if (!getToken()) return;
      try {
        const user = await apiGet('/api/me');
        if (user && user.is_admin) {
          const link = document.getElementById('adminLink');
          if (link) { link.style.display = 'inline'; link.href = 'admin.html'; }
        }
      } catch(e) {}
    })();

    loadFeed();
  </script>
</body>
</html>
