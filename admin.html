<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <title>ماي سمسم - لوحة الأدمن</title>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <h1>🐿️ سمسم</h1>
      <nav>
        <a href="index.html">الرئيسية</a>
        <a href="search.html">بحث</a>
        <a href="profile.html">ملفي</a>
        <a href="admin.html" class="active" style="color:#ff6b6b;">⚙️ الأدمن</a>
        <a href="#" onclick="logout()">خروج</a>
      </nav>
    </div>
    <div id="statusMsg" style="text-align:center; padding:20px;">جاري التحقق من الصلاحية...</div>
    <div id="adminContent" style="display:none;">
      <div class="card">
        <h2>المستخدمون</h2>
        <div id="usersList"></div>
      </div>
      <div class="card">
        <h2>المنشورات</h2>
        <div id="postsList"></div>
      </div>
    </div>
  </div>

  <script>
    // ⚠️ غيّر XXXXX إلى الجزء الخاص بك
    const API_BASE = 'https://social-api.omarawaad69.workers.dev';

    function getToken() { return localStorage.getItem('token'); }
    function logout() {
      localStorage.removeItem('token');
      window.location.href = 'login.html';
    }

    async function init() {
      const statusMsg = document.getElementById('statusMsg');
      const token = getToken();
      if (!token) {
        statusMsg.innerHTML = '❌ غير مسجل الدخول. <a href="login.html">سجل الدخول</a>';
        return;
      }

      try {
        const res = await fetch(API_BASE + '/api/me', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const user = await res.json();

        if (!res.ok || !user.is_admin) {
          statusMsg.innerHTML = '⛔ غير مصرح لك. هذه الصفحة للأدمن فقط.';
          return;
        }

        // نجاح التحقق
        statusMsg.style.display = 'none';
        document.getElementById('adminContent').style.display = 'block';
        loadUsers();
        loadPosts();

      } catch (e) {
        statusMsg.innerHTML = '❌ فشل الاتصال بالخادم. تأكد من اتصالك أو أعد تحميل الصفحة.';
      }
    }

    async function loadUsers() {
      const token = getToken();
      const res = await fetch(API_BASE + '/api/admin/users', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const users = await res.json();
      document.getElementById('usersList').innerHTML = users.map(u => `
        <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--border);">
          <span>@${u.username} (${u.email}) ${u.is_admin ? '⭐' : ''}</span>
          ${!u.is_admin ? `<button class="btn btn-small" style="background:#c0392b;" onclick="deleteUser('${u.id}')">حذف</button>` : ''}
        </div>
      `).join('');
    }

    async function loadPosts() {
      const token = getToken();
      const res = await fetch(API_BASE + '/api/admin/posts', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const posts = await res.json();
      document.getElementById('postsList').innerHTML = posts.map(p => `
        <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--border);">
          <span>${p.content?.substring(0,40) || 'منشور بدون نص'}...</span>
          <button class="btn btn-small" style="background:#c0392b;" onclick="deletePost('${p.id}')">حذف</button>
        </div>
      `).join('');
    }

    async function deleteUser(userId) {
      if (!confirm('متأكد من حذف المستخدم؟')) return;
      const token = getToken();
      await fetch(API_BASE + '/api/admin/delete-user', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({ userId })
      });
      loadUsers();
    }

    async function deletePost(postId) {
      if (!confirm('حذف المنشور؟')) return;
      const token = getToken();
      await fetch(API_BASE + '/api/admin/delete-post', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({ postId })
      });
      loadPosts();
    }

    init();
  </script>
</body>
</html>
