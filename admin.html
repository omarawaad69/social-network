<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <title>لوحة الأدمن - ماي سمسم</title>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="logo-area">
        <img src="logo.png" class="logo-img" alt="شعار">
        <span class="app-name-ar">ماي سمسم</span>
        <span class="app-name-en">MY SIMSIM</span>
      </div>
      <nav>
        <a href="index.html">الرئيسية</a>
        <a href="search.html">بحث</a>
        <a href="chats.html">💬</a>
        <a href="profile.html">ملفي</a>
        <a href="admin.html" class="active" style="color:#ff6b6b;">⚙️ الأدمن</a>
        <a href="#" onclick="logout()">خروج</a>
      </nav>
    </div>

    <div id="statusMsg" style="text-align:center; padding:20px;">جاري التحقق...</div>
    <div id="adminContent" style="display:none;">
      <div class="card">
        <h2>👥 المستخدمون</h2>
        <div id="usersList"></div>
      </div>
      <div class="card">
        <h2>📰 المنشورات</h2>
        <div id="postsList"></div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = 'https://social-api.omarawaad69.workers.dev'; // ⚠️ استبدل XXXXX

    function getToken() { return localStorage.getItem('token'); }
    function logout() {
      localStorage.removeItem('token');
      window.location.href = 'login.html';
    }

    async function init() {
      const token = getToken();
      if (!token) {
        document.getElementById('statusMsg').innerHTML = '❌ سجل الدخول أولاً.';
        return;
      }
      try {
        const res = await fetch(API_BASE + '/api/me', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const user = await res.json();
        if (!res.ok || !user.is_admin) {
          document.getElementById('statusMsg').innerHTML = '⛔ غير مصرح.';
          return;
        }
        document.getElementById('statusMsg').style.display = 'none';
        document.getElementById('adminContent').style.display = 'block';
        loadUsers();
        loadPosts();
      } catch (e) {
        document.getElementById('statusMsg').innerHTML = '❌ فشل الاتصال.';
      }
    }

    async function apiAdm(path, method = 'GET', body = null) {
      const opts = {
        method,
        headers: { 'Authorization': 'Bearer ' + getToken() }
      };
      if (body) {
        opts.headers['Content-Type'] = 'application/json';
        opts.body = JSON.stringify(body);
      }
      const res = await fetch(API_BASE + path, opts);
      return res.json();
    }

    async function loadUsers() {
      const users = await apiAdm('/api/admin/users');
      document.getElementById('usersList').innerHTML = users.map(u => `
        <div style="display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border);">
          <div>
            <b>@${u.username}</b> (${u.email})
            ${u.is_admin ? ' ⭐أدمن' : ''}
          </div>
          <div class="admin-actions">
            ${!u.is_admin
              ? `<button class="btn btn-small" style="background:#2ecc71;" onclick="makeAdmin('${u.id}')">ترقية لأدمن</button>`
              : `<button class="btn btn-small" style="background:#e67e22;" onclick="removeAdmin('${u.id}')">إلغاء الأدمن</button>`
            }
            ${!u.is_admin ? `<button class="btn btn-small" style="background:#c0392b;" onclick="deleteUser('${u.id}')">حذف</button>` : ''}
          </div>
        </div>
      `).join('');
    }

    async function loadPosts() {
      const posts = await apiAdm('/api/admin/posts');
      document.getElementById('postsList').innerHTML = posts.map(p => `
        <div style="display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border);">
          <div>
            <b>@${p.username}</b> (${p.email})<br>
            <span>${p.content?.substring(0,50) || 'بدون نص'} (${p.status})</span>
          </div>
          <div class="admin-actions">
            ${p.status === 'active'
              ? `<button class="btn btn-small" style="background:#e67e22;" onclick="suspendPost('${p.id}')">تعليق</button>`
              : `<button class="btn btn-small" style="background:#2ecc71;" onclick="activatePost('${p.id}')">تنشيط</button>`
            }
            <button class="btn btn-small" style="background:#c0392b;" onclick="deletePost('${p.id}')">حذف</button>
          </div>
        </div>
      `).join('');
    }

    async function makeAdmin(userId) {
      if (!confirm('ترقية المستخدم إلى أدمن؟')) return;
      await apiAdm('/api/admin/make-admin', 'POST', { userId });
      loadUsers();
    }

    async function removeAdmin(userId) {
      if (!confirm('إلغاء صلاحية الأدمن؟')) return;
      await apiAdm('/api/admin/remove-admin', 'POST', { userId });
      loadUsers();
    }

    async function deleteUser(userId) {
      if (!confirm('حذف المستخدم؟')) return;
      await apiAdm('/api/admin/delete-user', 'POST', { userId });
      loadUsers();
    }

    async function deletePost(postId) {
      if (!confirm('حذف المنشور؟')) return;
      await apiAdm('/api/admin/delete-post', 'POST', { postId });
      loadPosts();
    }

    async function suspendPost(postId) {
      await apiAdm('/api/admin/suspend-post', 'POST', { postId });
      loadPosts();
    }

    async function activatePost(postId) {
      await apiAdm('/api/admin/activate-post', 'POST', { postId });
      loadPosts();
    }

    init();
  </script>
</body>
</html>
