<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <title>تسجيل الدخول - شبكتي</title>
</head>
<body>
  <div class="login-container">
    <h1>شبكتي</h1>
    <div id="loginForm">
      <h2>تسجيل الدخول</h2>
      <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" required>
      <input type="password" id="loginPassword" placeholder="كلمة المرور" required>
      <button onclick="login()">دخول</button>
      <p>ليس لديك حساب؟ <a href="#" onclick="showRegister()">أنشئ حساباً</a></p>
    </div>
    <div id="registerForm" style="display:none;">
      <h2>إنشاء حساب</h2>
      <input type="text" id="regUsername" placeholder="اسم المستخدم" required>
      <input type="email" id="regEmail" placeholder="البريد الإلكتروني" required>
      <input type="password" id="regPassword" placeholder="كلمة المرور" required>
      <button onclick="register()">إنشاء</button>
      <p>لديك حساب؟ <a href="#" onclick="showLogin()">سجل الدخول</a></p>
    </div>
    <div id="message" style="color: red; margin-top: 10px;"></div>
  </div>
  <script src="js/api.js"></script>
  <script>
    function showRegister() {
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('registerForm').style.display = 'block';
      document.getElementById('message').innerText = '';
    }
    function showLogin() {
      document.getElementById('loginForm').style.display = 'block';
      document.getElementById('registerForm').style.display = 'none';
      document.getElementById('message').innerText = '';
    }
    function setMessage(text, isError = true) {
      const msg = document.getElementById('message');
      msg.innerText = text;
      msg.style.color = isError ? 'red' : 'green';
    }
    async function login() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      if (!email || !password) return setMessage('املأ الحقول');
      try {
        const res = await apiPost('/api/login', { email, password });
        if (res.token) {
          setToken(res.token);
          location.href = 'index.html';
        } else {
          setMessage('فشل تسجيل الدخول: ' + (res.error || 'بيانات خاطئة'));
        }
      } catch (e) {
        setMessage('خطأ في الاتصال بالخادم: ' + e.message);
      }
    }
    async function register() {
      const username = document.getElementById('regUsername').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      if (!username || !email || !password) return setMessage('املأ جميع الحقول');
      setMessage('جاري إنشاء الحساب...');
      try {
        const res = await apiPost('/api/register', { username, email, password });
        if (res.message) {
          setMessage('تم إنشاء الحساب بنجاح! يمكنك تسجيل الدخول الآن.', false);
          showLogin();
        } else {
          setMessage('فشل: ' + (res.error || 'البريد أو اسم المستخدم موجود مسبقاً'));
        }
      } catch (e) {
        setMessage('لا يمكن الوصول إلى الخادم. تحقق من الاتصال أو إعدادات API.');
      }
    }
  </script>
</body>
</html>
