<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <title>تسجيل الدخول - شبكتي</title>
</head>
<body>
  <div class="login-container">
    <h1>شبكتي</h1>
    <div id="loginForm">
      <h2>تسجيل الدخول</h2>
      <input type="email" id="loginEmail" placeholder="البريد الإلكتروني">
      <input type="password" id="loginPassword" placeholder="كلمة المرور">
      <button onclick="login()">دخول</button>
      <p>ليس لديك حساب؟ <a href="#" onclick="showRegister()">أنشئ حساباً</a></p>
    </div>
    <div id="registerForm" style="display:none;">
      <h2>إنشاء حساب</h2>
      <input type="text" id="regUsername" placeholder="اسم المستخدم">
      <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
      <input type="password" id="regPassword" placeholder="كلمة المرور">
      <button onclick="register()">إنشاء</button>
      <p>لديك حساب؟ <a href="#" onclick="showLogin()">سجل الدخول</a></p>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script>
    function showRegister() {
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('registerForm').style.display = 'block';
    }
    function showLogin() {
      document.getElementById('loginForm').style.display = 'block';
      document.getElementById('registerForm').style.display = 'none';
    }
    async function login() {
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      const res = await apiPost('/api/login', { email, password });
      if (res.token) {
        setToken(res.token);
        location.href = 'index.html';
      } else alert('فشل تسجيل الدخول');
    }
    async function register() {
      const username = document.getElementById('regUsername').value;
      const email = document.getElementById('regEmail').value;
      const password = document.getElementById('regPassword').value;
      const res = await apiPost('/api/register', { username, email, password });
      if (res.message) {
        alert('تم إنشاء الحساب، يمكنك تسجيل الدخول الآن');
        showLogin();
      } else alert('فشل إنشاء الحساب');
    }
  </script>
</body>
</html>
