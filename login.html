<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <title>ماي سمسم - الدخول</title>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <h1>🐿️ ماي سمسم</h1>
      <p class="subtitle">شبكتك الاجتماعية الآمنة والخاصة</p>
      <div id="loginForm">
        <h2>تسجيل الدخول</h2>
        <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" autocomplete="email">
        <input type="password" id="loginPassword" placeholder="كلمة المرور">
        <button class="btn" id="loginBtn" onclick="login()">دخول</button>
        <p style="margin-top:16px; color:#aaa;">ليس لديك حساب؟ <a href="#" onclick="showRegister()" style="color:var(--primary);">أنشئ حساباً</a></p>
      </div>
      <div id="registerForm" style="display:none;">
        <h2>إنشاء حساب جديد</h2>
        <input type="text" id="regUsername" placeholder="اسم المستخدم">
        <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
        <input type="password" id="regPassword" placeholder="كلمة المرور">
        <button class="btn" id="regBtn" onclick="register()">إنشاء حساب</button>
        <p style="margin-top:16px; color:#aaa;">لديك حساب؟ <a href="#" onclick="showLogin()" style="color:var(--primary);">سجل الدخول</a></p>
      </div>
      <div id="message" style="margin-top:14px; font-size:0.9rem;"></div>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script>
    function showRegister() {
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('registerForm').style.display = 'block';
      document.getElementById('message').innerHTML = '';
    }
    function showLogin() {
      document.getElementById('loginForm').style.display = 'block';
      document.getElementById('registerForm').style.display = 'none';
      document.getElementById('message').innerHTML = '';
    }
    function showMsg(text, isError = true) {
      const msg = document.getElementById('message');
      msg.innerHTML = text;
      msg.style.color = isError ? '#ff6b6b' : '#6bff90';
    }
    function setLoading(btn, loading) {
      btn.disabled = loading;
      btn.innerHTML = loading ? '<span class="spinner"></span> جاري...' : btn.getAttribute('data-text');
    }
    window.onload = function() {
      document.getElementById('loginBtn').setAttribute('data-text', 'دخول');
      document.getElementById('regBtn').setAttribute('data-text', 'إنشاء حساب');
    };
    async function login() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      if (!email || !password) return showMsg('يرجى ملء جميع الحقول');
      const btn = document.getElementById('loginBtn');
      setLoading(btn, true);
      try {
        const res = await apiPost('/api/login', { email, password });
        if (res.token) {
          setToken(res.token);
          window.location.href = 'index.html';
        } else {
          showMsg(res.error || 'بيانات خاطئة');
        }
      } catch (e) {
        showMsg('خطأ في الاتصال بالخادم');
      } finally {
        setLoading(btn, false);
      }
    }
    async function register() {
      const username = document.getElementById('regUsername').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      if (!username || !email || !password) return showMsg('جميع الحقول مطلوبة');
      const btn = document.getElementById('regBtn');
      setLoading(btn, true);
      try {
        const res = await apiPost('/api/register', { username, email, password });
        if (res.message) {
          showMsg('تم إنشاء الحساب بنجاح! سجل الدخول الآن.', false);
          showLogin();
        } else {
          showMsg(res.error || 'فشل في الإنشاء');
        }
      } catch (e) {
        showMsg('لا يمكن الوصول إلى الخادم');
      } finally {
        setLoading(btn, false);
      }
    }
  </script>
</body>
</html>
