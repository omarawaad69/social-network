<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <title>ماي سمسم - بحث</title>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="logo-area">
        <img src="logo.png" class="logo-img" alt="شعار">
        <span class="app-name-ar">ماي سمسم</span>
        <span class="app-name-en">MY SIMSIM</span>
      </div>
      <nav>
        <a href="index.html">الرئيسية</a>
        <a href="search.html" class="active">بحث</a>
        <a href="chats.html" id="chatsLink">💬 <span id="unreadBadge" class="badge" style="display:none;">0</span></a>
        <a href="profile.html">ملفي</a>
        <a href="#" id="adminLink" style="display:none;">⚙️</a>
        <a href="#" onclick="logout()">خروج</a>
      </nav>
    </div>
    <div class="card">
      <input type="text" id="searchInput" placeholder="ابحث عن اسم المستخدم...">
      <button class="btn" onclick="searchUsers()">بحث</button>
    </div>
    <div id="results"></div>
  </div>
  <script src="js/api.js"></script>
  <script>
    if (!getToken()) location.href = 'login.html';
    (async function checkAdmin() {
      try { const u = await apiGet('/api/me'); if (u.is_admin) document.getElementById('adminLink').style.display='inline'; } catch(e){}
    })();
    async function searchUsers() {
      const q = document.getElementById('searchInput').value.trim();
      if (!q) return;
      const results = document.getElementById('results');
      results.innerHTML = '<span class="spinner"></span>';
      const users = await apiGet(`/api/users/search?q=${encodeURIComponent(q)}`);
      if (!users.length) { results.innerHTML = '<p>لا يوجد مستخدمون بهذا الاسم.</p>'; return; }
      results.innerHTML = users.map(u => `
        <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
          <div><b>@${u.username}</b><br><small style="color:#aaa;">${u.email}</small></div>
          <div class="admin-actions">
            <button class="btn btn-small" onclick="location.href='chat.html?user=${u.id}'">💬 دردشة</button>
            <button class="btn btn-small" onclick="followUser('${u.id}', this)">متابعة</button>
          </div>
        </div>`).join('');
    }
    async function followUser(targetId, btn) {
      const res = await apiPost('/api/follow', { targetUserId: targetId });
      btn.innerText = res.following ? 'تم ✓' : 'متابعة';
    }
    // تحديث عداد غير المقروء
    async function updateUnreadCount() {
      try {
        const res = await apiGet('/api/chats/unread-count');
        const badge = document.getElementById('unreadBadge');
        if (badge) {
          if (res.count > 0) { badge.innerText = res.count; badge.style.display = 'inline'; }
          else { badge.style.display = 'none'; }
        }
      } catch(e) {}
    }
    updateUnreadCount();
    setInterval(updateUnreadCount, 30000);
  </script>
</body>
</html>
