<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <title>ماي سمسم - الرئيسية</title>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="logo-area">
        <img src="logo.png" class="logo-img" alt="شعار">
        <span class="app-name-ar">ماي سمسم</span>
        <span class="app-name-en">MY SIMSIM</span>
      </div>
      <nav>
        <a href="index.html" class="active">الرئيسية</a>
        <a href="search.html">بحث</a>
        <a href="chats.html" id="chatsLink">💬 <span id="unreadBadge" class="badge" style="display:none;">0</span></a>
        <a href="notifications.html" id="notifLink">🔔 <span id="notifBadge" class="badge" style="display:none;">0</span></a>
        <a href="profile.html">ملفي</a>
        <a href="#" id="adminLink" style="display:none;">⚙️</a>
        <button class="mode-toggle" onclick="toggleMode()" title="تغيير الوضع">🌓</button>
        <a href="#" onclick="logout()">خروج</a>
      </nav>
    </div>

    <!-- شريط القصص (يظهر دائماً) -->
    <div id="storiesBar" class="stories-bar">
      <div class="stories-container" id="storiesContainer">
        <!-- قصة "أضف قصتك" -->
        <div class="story-item add-story" onclick="addStory()">
          <div class="story-avatar" style="background:linear-gradient(45deg, #e94560, #ff6b6b);">
            <span style="font-size:1.5rem;">+</span>
          </div>
          <span class="story-username" style="font-size:0.6rem;">قصتك</span>
        </div>
      </div>
    </div>

    <!-- عارض القصص -->
    <div id="storyViewer" class="story-viewer" style="display:none;">
      <div class="story-viewer-header">
        <span id="storyViewerUsername" style="font-weight:700;"></span>
        <span id="storyViewerTime" style="font-size:0.7rem; color:#aaa;"></span>
        <button class="close-story" onclick="closeStoryViewer()">&times;</button>
      </div>
      <img id="storyViewerImage" style="width:100%; max-height:80vh; object-fit:contain;" />
    </div>

    <!-- مربع النشر -->
    <div class="card">
      <textarea id="postContent" placeholder="ما الذي يدور في ذهنك؟" rows="2"></textarea>
      <div class="upload-btn-wrapper">
        <div class="upload-icon">📷 إضافة صورة</div>
        <input type="file" id="postImage" accept="image/*" onchange="previewImage()">
      </div>
      <img id="imagePreview" class="image-preview" />
      <button class="btn" id="publishBtn" onclick="createPost()">نشر</button>
    </div>
    <div id="feed"></div>
  </div>

  <!-- نافذة رفع القصة -->
  <div id="storyUploadModal" class="modal" style="display:none;">
    <div class="modal-content">
      <span class="close" onclick="closeStoryUpload()">&times;</span>
      <h3>إضافة قصة جديدة</h3>
      <p style="font-size:0.8rem; color:#aaa;">تختفي بعد 24 ساعة</p>
      <input type="file" id="storyImage" accept="image/*">
      <img id="storyPreview" class="image-preview" />
      <button class="btn" onclick="uploadStory()" style="margin-top:10px;">نشر القصة</button>
    </div>
  </div>

  <!-- قائمة الرموز التعبيرية -->
  <div id="reactionPicker" class="reaction-picker" style="display:none;">
    <button onclick="selectReaction('like')">👍</button>
    <button onclick="selectReaction('love')">❤️</button>
    <button onclick="selectReaction('haha')">😂</button>
    <button onclick="selectReaction('wow')">🔥</button>
    <button onclick="selectReaction('sad')">😢</button>
    <button onclick="selectReaction('angry')">😡</button>
  </div>

  <!-- نافذة المتفاعلين -->
  <div id="reactorsModal" class="modal" style="display:none;">
    <div class="modal-content">
      <span class="close" onclick="closeReactorsModal()">&times;</span>
      <h3>التفاعلات</h3>
      <div id="reactorsList"></div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    if (!getToken()) location.href = 'login.html';
    document.getElementById('publishBtn').setAttribute('data-text', 'نشر');
    let currentUserId = null;
    let currentPostId = null;
    let activeReactionBtn = null;

    // ---------- دوال الوضع والشارات ----------
    function toggleMode() {
      document.body.classList.toggle('light-mode');
      localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
    }

    async function updateUnreadCount() {
      try {
        const res = await apiGet('/api/chats/unread-count');
        const badge = document.getElementById('unreadBadge');
        if (badge) {
          if (res.count > 0) { badge.innerText = res.count; badge.style.display = 'inline'; }
          else badge.style.display = 'none';
        }
      } catch(e) {}
    }

    async function updateNotifBadge() {
      try {
        const res = await apiGet('/api/notifications/unread-count');
        const b = document.getElementById('notifBadge');
        if (b) {
          if (res.count > 0) { b.innerText = res.count; b.style.display = 'inline'; }
          else b.style.display = 'none';
        }
      } catch(e) {}
    }

    // ---------- القصص ----------
    async function loadStories() {
      const container = document.getElementById('storiesContainer');
      const bar = document.getElementById('storiesBar');
      
      // إظهار الشريط دائماً
      bar.style.display = 'block';
      
      // إعادة بناء الحاوية (مع الاحتفاظ بزر الإضافة)
      container.innerHTML = `
        <div class="story-item add-story" onclick="addStory()">
          <div class="story-avatar" style="background:linear-gradient(45deg, #e94560, #ff6b6b);">
            <span style="font-size:1.5rem;">+</span>
          </div>
          <span class="story-username" style="font-size:0.6rem;">قصتك</span>
        </div>
      `;
      
      try {
        const stories = await apiGet('/api/stories');
        if (!stories.length) return;
        
        // تجميع القصص حسب المستخدم
        const userStories = {};
        stories.forEach(s => {
          if (!userStories[s.user_id]) userStories[s.user_id] = [];
          userStories[s.user_id].push(s);
        });
        
        for (const [userId, userStoriesList] of Object.entries(userStories)) {
          const latest = userStoriesList[0];
          const hasUnviewed = userStoriesList.some(s => !s.viewed);
          const borderColor = hasUnviewed ? 'linear-gradient(45deg, #e94560, #ff6b6b)' : '#555';
          
          const storyEl = document.createElement('div');
          storyEl.className = 'story-item';
          storyEl.onclick = () => viewStory(latest.id, userId);
          storyEl.innerHTML = `
            <div class="story-avatar" style="background:${borderColor}; padding:3px;">
              <img src="${latest.image_url}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">
            </div>
            <span class="story-username" style="font-size:0.6rem;">@${latest.username}</span>
          `;
          container.appendChild(storyEl);
        }
      } catch(e) {
        console.error('فشل تحميل القصص:', e);
      }
    }

    function addStory() {
      document.getElementById('storyUploadModal').style.display = 'block';
    }

    function closeStoryUpload() {
      document.getElementById('storyUploadModal').style.display = 'none';
      document.getElementById('storyImage').value = '';
      document.getElementById('storyPreview').style.display = 'none';
    }

    // معاينة صورة القصة
    document.getElementById('storyImage').addEventListener('change', function() {
      const file = this.files[0];
      if (file) {
        const preview = document.getElementById('storyPreview');
        preview.src = URL.createObjectURL(file);
        preview.style.display = 'block';
      }
    });

    async function uploadStory() {
      const file = document.getElementById('storyImage').files[0];
      if (!file) return alert('اختر صورة للقصة');
      
      const fd = new FormData();
      fd.append('image', file);
      
      try {
        const res = await apiPostFormData('/api/stories', fd);
        if (res.id) {
          closeStoryUpload();
          loadStories();
          alert('تم نشر القصة بنجاح!');
        } else {
          alert('فشل نشر القصة: ' + (res.error || 'خطأ غير معروف'));
        }
      } catch(e) {
        alert('خطأ في رفع القصة: ' + (e.message || ''));
      }
    }

    async function viewStory(storyId, userId) {
      await apiPost(`/api/stories/${storyId}/view`, {});
      const story = (await apiGet('/api/stories')).find(s => s.id === storyId);
      if (story) {
        document.getElementById('storyViewerUsername').innerText = '@' + story.username;
        document.getElementById('storyViewerTime').innerText = new Date(story.created_at).toLocaleString('ar-EG');
        document.getElementById('storyViewerImage').src = story.image_url;
        document.getElementById('storyViewer').style.display = 'block';
        setTimeout(closeStoryViewer, 5000);
      }
    }

    function closeStoryViewer() {
      document.getElementById('storyViewer').style.display = 'none';
    }

    // ---------- المنشورات ----------
    function previewImage() {
      const file = document.getElementById('postImage').files[0];
      const preview = document.getElementById('imagePreview');
      if (file) {
        preview.src = URL.createObjectURL(file);
        preview.style.display = 'block';
      } else {
        preview.style.display = 'none';
      }
    }

    async function loadFeed() {
      const feed = document.getElementById('feed');
      feed.innerHTML = '<div style="text-align:center;"><span class="spinner"></span></div>';
      try {
        const posts = await apiGet('/api/posts');
        if (!posts.length) {
          feed.innerHTML = '<p style="color:var(--text-secondary); text-align:center;">لا توجد منشورات. كن أول من ينشر!</p>';
          return;
        }
        feed.innerHTML = posts.map(p => {
          const reactionEmoji = { like: '👍', love: '❤️', haha: '😂', wow: '🔥', sad: '😢', angry: '😡' };
          const myReaction = p.reaction_by_me;
          const emoji = myReaction ? reactionEmoji[myReaction] : '🤍';
          const likedClass = myReaction ? 'liked' : '';
          const isMine = (currentUserId && p.user_id === currentUserId);
          return `
            <div class="card post" id="post-${p.id}">
              <div class="post-header">
                <div class="post-user">
                  <div class="post-avatar">${p.username.charAt(0).toUpperCase()}</div>
                  <span class="post-username">@${p.username}</span>
                </div>
                <div style="display:flex; gap:8px;">
                  <button class="btn btn-small" style="padding:4px 10px;" onclick="location.href='chat.html?user=${p.user_id}'">💬</button>
                  ${isMine ? `
                  <div class="post-menu" onclick="toggleMenu('menu-${p.id}')">⋯
                    <div id="menu-${p.id}" class="post-menu-content">
                      <button onclick="editPost('${p.id}')">✏️ تعديل</button>
                      <button onclick="deletePost('${p.id}')">🗑️ حذف</button>
                    </div>
                  </div>` : ''}
                </div>
              </div>
              <div class="post-content" id="content-${p.id}">${p.content || ''}</div>
              ${p.image_url ? `<img src="${p.image_url}" class="post-image">` : ''}
              <div class="post-actions">
                <button class="like-btn ${likedClass}" onclick="event.stopPropagation(); showReactionPicker('${p.id}', this)">
                  ${emoji}
                </button>
                <button onclick="showReactors('${p.id}')" style="font-size:0.8rem; color:var(--text-secondary);">
                  <span>${p.likes_count || 0}</span>
                </button>
                <button onclick="toggleComments('${p.id}')">💬 <span>${p.comments_count || 0}</span></button>
              </div>
              <div id="comments-${p.id}" class="comment-section" style="display:none;"></div>
            </div>
          `;
        }).join('');
      } catch (e) {
        feed.innerHTML = '<p style="color:red;">فشل تحميل المنشورات</p>';
      }
    }

    function toggleMenu(id) {
      const m = document.getElementById(id);
      m.style.display = m.style.display === 'block' ? 'none' : 'block';
      event.stopPropagation();
    }
    document.addEventListener('click', () => {
      document.querySelectorAll('.post-menu-content').forEach(m => m.style.display = 'none');
    });

    async function editPost(postId) {
      const newContent = prompt('تعديل المنشور:', document.getElementById(`content-${postId}`).innerText);
      if (newContent === null || newContent.trim() === '') return;
      const res = await apiPut(`/api/posts/${postId}/edit`, { content: newContent });
      if (res.success) {
        document.getElementById(`content-${postId}`).innerText = newContent;
      } else {
        alert(res.error || 'فشل التعديل');
      }
    }

    async function deletePost(postId) {
      if (!confirm('حذف المنشور؟')) return;
      const res = await apiPost(`/api/posts/${postId}/delete`, {});
      if (res.success) {
        document.getElementById(`post-${postId}`).remove();
      } else {
        alert(res.error || 'فشل الحذف');
      }
    }

    async function createPost() {
      const content = document.getElementById('postContent').value.trim();
      const imageFile = document.getElementById('postImage').files[0];
      if (!content && !imageFile) return alert('أضف نصاً أو صورة');
      const btn = document.getElementById('publishBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';
      try {
        let result;
        if (imageFile) {
          const fd = new FormData();
          fd.append('content', content);
          fd.append('image', imageFile);
          result = await apiPostFormData('/api/posts', fd);
        } else {
          result = await apiPost('/api/posts', { content });
        }
        if (result.id) {
          document.getElementById('postContent').value = '';
          document.getElementById('postImage').value = '';
          document.getElementById('imagePreview').style.display = 'none';
          loadFeed();
        } else {
          alert('فشل النشر: ' + (result.error || 'استجابة غير متوقعة'));
        }
      } catch (e) {
        alert('خطأ تقني: ' + e.message);
      } finally {
        btn.disabled = false;
        btn.innerHTML = btn.getAttribute('data-text');
      }
    }

    function showReactionPicker(postId, btnElement) {
      currentPostId = postId;
      activeReactionBtn = btnElement;
      const picker = document.getElementById('reactionPicker');
      const rect = btnElement.getBoundingClientRect();
      picker.style.display = 'flex';
      picker.style.visibility = 'hidden';
      const pickerWidth = picker.offsetWidth;
      const centerX = rect.left + rect.width / 2;
      let left = centerX - pickerWidth / 2;
      if (left < 10) left = 10;
      if (left + pickerWidth > window.innerWidth - 10) left = window.innerWidth - pickerWidth - 10;
      picker.style.top = (rect.top - 60) + 'px';
      picker.style.left = left + 'px';
      picker.style.transform = 'none';
      picker.style.visibility = 'visible';
      setTimeout(() => { picker.style.display = 'none'; }, 3000);
    }

    async function selectReaction(reaction) {
      document.getElementById('reactionPicker').style.display = 'none';
      if (!currentPostId) return;
      const res = await apiPost('/api/like', { postId: currentPostId, reaction });
      if (activeReactionBtn) {
        const postCard = document.getElementById(`post-${currentPostId}`);
        if (postCard) {
          const likeBtn = postCard.querySelector('.like-btn');
          if (likeBtn) {
            const emojiMap = { like: '👍', love: '❤️', haha: '😂', wow: '🔥', sad: '😢', angry: '😡' };
            likeBtn.innerHTML = emojiMap[reaction] + ' <span>' + (res.likes_count || 0) + '</span>';
            likeBtn.className = 'like-btn liked';
          }
        }
      }
      currentPostId = null;
      activeReactionBtn = null;
    }

    async function showReactors(postId) {
      const modal = document.getElementById('reactorsModal');
      const list = document.getElementById('reactorsList');
      modal.style.display = 'block';
      list.innerHTML = '<div style="text-align:center;"><span class="spinner"></span></div>';
      try {
        const reactions = await apiGet(`/api/posts/${postId}/reactions`);
        const emojiMap = { like: '👍', love: '❤️', haha: '😂', wow: '🔥', sad: '😢', angry: '😡' };
        list.innerHTML = reactions.map(r => `<div class="reactor-item">${emojiMap[r.reaction] || r.reaction} @${r.username}</div>`).join('');
        if (!reactions.length) list.innerHTML = '<p>لا تفاعلات بعد</p>';
      } catch (e) {
        list.innerHTML = '<p style="color:red;">فشل التحميل</p>';
      }
    }

    function closeReactorsModal() {
      document.getElementById('reactorsModal').style.display = 'none';
    }

    async function toggleComments(postId) {
      const div = document.getElementById(`comments-${postId}`);
      if (div.style.display === 'block') { div.style.display = 'none'; return; }
      div.innerHTML = '<span class="spinner"></span>';
      div.style.display = 'block';
      const comments = await apiGet(`/api/comments/${postId}`);
      div.innerHTML = comments.map(c => `<div class="comment-item"><b>${c.username}</b>: ${c.text}</div>`).join('') +
        `<div style="display:flex; gap:8px; margin-top:8px;">
          <input id="commInput-${postId}" placeholder="أضف تعليقاً" style="flex:1;">
          <button class="btn btn-small" onclick="addComment('${postId}')">تعليق</button>
        </div>`;
    }

    async function addComment(postId) {
      const input = document.getElementById(`commInput-${postId}`);
      const text = input.value.trim();
      if (!text) return;
      await apiPost('/api/comments', { postId, text });
      input.value = '';
      toggleComments(postId);
    }

    document.addEventListener('click', function(e) {
      if (!e.target.closest('.like-btn')) {
        document.getElementById('reactionPicker').style.display = 'none';
      }
    });

    // ---------- دالة init ----------
    (async function init() {
      if (!getToken()) return location.href = 'login.html';
      
      if (localStorage.getItem('theme') === 'light') {
        document.body.classList.add('light-mode');
      }
      
      try {
        const me = await apiGet('/api/me');
        currentUserId = me.id;
        if (me.is_admin) {
          const link = document.getElementById('adminLink');
          if (link) { link.style.display = 'inline'; link.href = 'admin.html'; }
        }
      } catch(e) {}
      
      loadStories();
      loadFeed();
      updateUnreadCount();
      updateNotifBadge();
      setInterval(loadStories, 60000);
      setInterval(updateUnreadCount, 30000);
      setInterval(updateNotifBadge, 30000);
    })();
  </script>
</body>
</html>
