<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <title>ماي سمسم - الرئيسية</title>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="logo-area">
        <img src="logo.png" class="logo-img" alt="شعار">
        <span class="app-name-ar">ماي سمسم</span>
        <span class="app-name-en">MY SIMSIM</span>
      </div>
      <nav>
        <a href="index.html" class="active">الرئيسية</a>
        <a href="search.html">بحث</a>
        <a href="chats.html">💬</a>
        <a href="profile.html">ملفي</a>
        <a href="#" id="adminLink" style="display:none;">⚙️</a>
        <a href="#" onclick="logout()">خروج</a>
      </nav>
    </div>

    <div class="card">
      <textarea id="postContent" placeholder="ما الذي يدور في ذهنك؟" rows="2"></textarea>
      <div class="upload-btn-wrapper">
        <div class="upload-icon">📷 إضافة صورة</div>
        <input type="file" id="postImage" accept="image/*" onchange="previewImage()">
      </div>
      <img id="imagePreview" class="image-preview" />
      <button class="btn" id="publishBtn" onclick="createPost()">نشر</button>
    </div>
    <div id="feed"></div>
  </div>

  <script src="js/api.js"></script>
  <script>
    if (!getToken()) location.href = 'login.html';
    document.getElementById('publishBtn').setAttribute('data-text', 'نشر');
    let currentUserId = null;

    function previewImage() {
      const file = document.getElementById('postImage').files[0];
      const preview = document.getElementById('imagePreview');
      if (file) {
        preview.src = URL.createObjectURL(file);
        preview.style.display = 'block';
      } else {
        preview.style.display = 'none';
      }
    }

    async function loadFeed() {
      const feed = document.getElementById('feed');
      feed.innerHTML = '<div style="text-align:center;"><span class="spinner"></span></div>';
      try {
        const posts = await apiGet('/api/posts');
        if (!posts.length) {
          feed.innerHTML = '<p style="color:#aaa; text-align:center;">لا توجد منشورات. كن أول من ينشر!</p>';
          return;
        }
        feed.innerHTML = posts.map(p => {
          const likedClass = p.liked_by_me ? 'liked' : '';
          const isMine = (currentUserId && p.user_id === currentUserId);
          return `
            <div class="card post" id="post-${p.id}">
              <div class="post-header">
                <div class="post-user">
                  <div class="post-avatar">${p.username.charAt(0).toUpperCase()}</div>
                  <span class="post-username">@${p.username}</span>
                </div>
                <div style="display:flex; gap:8px;">
                  <button class="btn btn-small" style="padding:4px 10px;" onclick="location.href='chat.html?user=${p.user_id}'">💬</button>
                  ${isMine ? `
                  <div class="post-menu" onclick="toggleMenu('menu-${p.id}')">⋯
                    <div id="menu-${p.id}" class="post-menu-content">
                      <button onclick="editPost('${p.id}')">✏️ تعديل</button>
                      <button onclick="deletePost('${p.id}')">🗑️ حذف</button>
                    </div>
                  </div>` : ''}
                </div>
              </div>
              <div class="post-content" id="content-${p.id}">${p.content || ''}</div>
              ${p.image_url ? `<img src="${p.image_url}" class="post-image">` : ''}
              <div class="post-actions">
                <button class="${likedClass}" onclick="likePost('${p.id}', this)">
                  ${p.liked_by_me ? '❤️' : '🤍'} <span>${p.likes_count || 0}</span>
                </button>
                <button onclick="toggleComments('${p.id}')">💬 <span>${p.comments_count || 0}</span></button>
              </div>
              <div id="comments-${p.id}" class="comment-section" style="display:none;"></div>
            </div>
          `;
        }).join('');
      } catch (e) {
        feed.innerHTML = '<p style="color:red;">فشل تحميل المنشورات</p>';
      }
    }

    function toggleMenu(id) {
      const m = document.getElementById(id);
      m.style.display = m.style.display === 'block' ? 'none' : 'block';
      event.stopPropagation();
    }
    document.addEventListener('click', () => {
      document.querySelectorAll('.post-menu-content').forEach(m => m.style.display = 'none');
    });

    async function editPost(postId) {
      const newContent = prompt('تعديل المنشور:', document.getElementById(`content-${postId}`).innerText);
      if (newContent === null || newContent.trim() === '') return;
      const res = await apiPut(`/api/posts/${postId}/edit`, { content: newContent });
      if (res.success) {
        document.getElementById(`content-${postId}`).innerText = newContent;
      } else {
        alert(res.error || 'فشل التعديل');
      }
    }

    async function deletePost(postId) {
      if (!confirm('حذف المنشور؟')) return;
      const res = await apiPost(`/api/posts/${postId}/delete`, {});
      if (res.success) {
        document.getElementById(`post-${postId}`).remove();
      } else {
        alert(res.error || 'فشل الحذف');
      }
    }

    async function createPost() {
      const content = document.getElementById('postContent').value.trim();
      const imageFile = document.getElementById('postImage').files[0];
      if (!content && !imageFile) return alert('أضف نصاً أو صورة');
      const btn = document.getElementById('publishBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';
      try {
        let result;
        if (imageFile) {
          const fd = new FormData();
          fd.append('content', content);
          fd.append('image', imageFile);
          result = await apiPostFormData('/api/posts', fd);
        } else {
          result = await apiPost('/api/posts', { content });
        }
        if (result.id) {
          document.getElementById('postContent').value = '';
          document.getElementById('postImage').value = '';
          document.getElementById('imagePreview').style.display = 'none';
          loadFeed();
        } else {
          alert('فشل النشر: ' + (result.error || 'استجابة غير متوقعة'));
        }
      } catch (e) {
        alert('خطأ تقني: ' + e.message);
      } finally {
        btn.disabled = false;
        btn.innerHTML = btn.getAttribute('data-text');
      }
    }

    async function likePost(postId, btn) {
      await apiPost('/api/like', { postId });
      loadFeed();
    }

    async function toggleComments(postId) {
      const div = document.getElementById(`comments-${postId}`);
      if (div.style.display === 'block') { div.style.display = 'none'; return; }
      div.innerHTML = '<span class="spinner"></span>';
      div.style.display = 'block';
      const comments = await apiGet(`/api/comments/${postId}`);
      div.innerHTML = comments.map(c => `<div class="comment-item"><b>${c.username}</b>: ${c.text}</div>`).join('') +
        `<div style="display:flex; gap:8px; margin-top:8px;">
          <input id="commInput-${postId}" placeholder="أضف تعليقاً" style="flex:1;">
          <button class="btn btn-small" onclick="addComment('${postId}')">تعليق</button>
        </div>`;
    }

    async function addComment(postId) {
      const input = document.getElementById(`commInput-${postId}`);
      const text = input.value.trim();
      if (!text) return;
      await apiPost('/api/comments', { postId, text });
      input.value = '';
      toggleComments(postId);
    }

    (async function init() {
      if (!getToken()) return location.href = 'login.html';
      try {
        const me = await apiGet('/api/me');
        currentUserId = me.id;
        if (me.is_admin) {
          const link = document.getElementById('adminLink');
          if (link) { link.style.display = 'inline'; link.href = 'admin.html'; }
        }
      } catch(e) {}
      loadFeed();
    })();
  </script>
</body>
</html>
